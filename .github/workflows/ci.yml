name: CI

on:
  pull_request:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

env:
  EMSDK_VERSION: "5.0.7"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Setup Emscripten
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          "$RUNNER_TEMP/emsdk/emsdk" install "$EMSDK_VERSION"
          "$RUNNER_TEMP/emsdk/emsdk" activate "$EMSDK_VERSION"
          echo "EMSDK=$RUNNER_TEMP/emsdk" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/emsdk" >> "$GITHUB_PATH"
          echo "$RUNNER_TEMP/emsdk/upstream/emscripten" >> "$GITHUB_PATH"

      - name: Build WASM wrapper
        run: npm run build:wasm

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke dist exports
        run: npm run smoke:dist

      - name: Smoke TypeScript consumer
        run: npm run smoke:types
