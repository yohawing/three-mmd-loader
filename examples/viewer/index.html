<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>three-mmd-loader viewer</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" />
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "/node_modules/three/build/three.module.js",
          "three/addons/": "/node_modules/three/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main class="viewer-shell">
      <header class="top-bar" aria-label="Viewer menu">
        <nav class="menu-actions" aria-label="Model and motion loading">
          <details class="load-menu" id="load-menu">
            <summary aria-label="Menu">
              <span id="load-menu-icon" class="material-symbols-rounded" aria-hidden="true">menu</span>
            </summary>
            <div class="load-menu-panel" role="menu" aria-label="Load options">
              <section class="load-section" id="asset-preset-section" aria-labelledby="preset-section-title" hidden>
                <h2 id="preset-section-title">Preset</h2>
                <div class="asset-load-row">
                  <label for="asset-preset-select">Fixture</label>
                  <select id="asset-preset-select" aria-label="Local asset preset" hidden></select>
                  <button id="load-asset-preset" type="button" role="menuitem" hidden>Load</button>
                </div>
                <div class="asset-load-row" id="save-current-preset-row">
                  <label for="save-current-preset">Current</label>
                  <span class="asset-load-row-note">Loaded assets</span>
                  <button id="save-current-preset" type="button" role="menuitem">Save</button>
                </div>
              </section>

              <details class="load-category" id="model-load-category" open>
                <summary>Model</summary>
                <button id="choose-model-file" type="button" role="menuitem">Load From File...</button>
                <button id="choose-model-folder" type="button" role="menuitem">Load From Folder...</button>
                <div class="asset-load-row" hidden>
                  <label for="asset-model-select">Fixture</label>
                  <select id="asset-model-select" aria-label="Local model asset" hidden></select>
                  <button id="load-asset-model" type="button" role="menuitem" hidden>Load</button>
                </div>
                <div class="asset-load-row" hidden>
                  <label for="recent-model-select">Recent</label>
                  <select id="recent-model-select" aria-label="Recent model asset" hidden></select>
                  <button id="load-recent-model" type="button" role="menuitem" hidden>Load</button>
                </div>
              </details>

              <details class="load-category" id="motion-load-category">
                <summary>Motion</summary>
                <button id="choose-motion" type="button" role="menuitem">Load From File...</button>
                <button id="choose-pose" type="button" role="menuitem">Pose...</button>
                <div class="asset-load-row" hidden>
                  <label for="asset-motion-select">Fixture</label>
                  <select id="asset-motion-select" aria-label="Local motion asset" hidden></select>
                  <button id="load-asset-motion" type="button" role="menuitem" hidden>Load</button>
                </div>
                <div class="asset-load-row" hidden>
                  <label for="recent-motion-select">Recent</label>
                  <select id="recent-motion-select" aria-label="Recent motion asset" hidden></select>
                  <button id="load-recent-motion" type="button" role="menuitem" hidden>Load</button>
                </div>
              </details>

              <details class="load-category" id="audio-load-category">
                <summary>Audio</summary>
                <button id="choose-audio" type="button" role="menuitem">Load From File...</button>
                <div class="asset-load-row" hidden>
                  <label for="asset-audio-select">Fixture</label>
                  <select id="asset-audio-select" aria-label="Local audio asset" hidden></select>
                  <button id="load-asset-audio" type="button" role="menuitem" hidden>Load</button>
                </div>
                <div class="asset-load-row" hidden>
                  <label for="recent-audio-select">Recent</label>
                  <select id="recent-audio-select" aria-label="Recent audio asset" hidden></select>
                  <button id="load-recent-audio" type="button" role="menuitem" hidden>Load</button>
                </div>
              </details>

              <details class="load-category" id="background-load-category">
                <summary>Background</summary>
                <button id="choose-background" type="button" role="menuitem">Load From File...</button>
                <div class="asset-load-row" hidden>
                  <label for="asset-background-select">Fixture</label>
                  <select id="asset-background-select" aria-label="Local background asset" hidden></select>
                  <button id="load-asset-background" type="button" role="menuitem" hidden>Load</button>
                </div>
                <div class="asset-load-row" hidden>
                  <label for="recent-background-select">Recent</label>
                  <select id="recent-background-select" aria-label="Recent background asset" hidden></select>
                  <button id="load-recent-background" type="button" role="menuitem" hidden>Load</button>
                </div>
              </details>

              <details class="load-category" id="camera-load-category">
                <summary>Camera</summary>
                <button id="choose-camera" type="button" role="menuitem">Load From File...</button>
                <div class="asset-load-row" hidden>
                  <label for="asset-camera-select">Fixture</label>
                  <select id="asset-camera-select" aria-label="Local camera asset" hidden></select>
                  <button id="load-asset-camera" type="button" role="menuitem" hidden>Load</button>
                </div>
                <div class="asset-load-row" hidden>
                  <label for="recent-camera-select">Recent</label>
                  <select id="recent-camera-select" aria-label="Recent camera asset" hidden></select>
                  <button id="load-recent-camera" type="button" role="menuitem" hidden>Load</button>
                </div>
              </details>
            </div>
          </details>
        </nav>

        <div class="loaded-files" aria-label="Loaded files">
          <div class="loaded-file-control" id="model-control" hidden>
            <select id="model-switcher" aria-label="Selected model"></select>
            <button id="clear-model" class="clear-loaded-file" type="button" aria-label="Clear model">
              <span class="material-symbols-rounded" aria-hidden="true">close</span>
            </button>
          </div>
          <div class="loaded-file-control" id="motion-control" hidden>
            <select id="motion-switcher" aria-label="Selected motion"></select>
            <button id="clear-motion" class="clear-loaded-file" type="button" aria-label="Clear motion">
              <span class="material-symbols-rounded" aria-hidden="true">close</span>
            </button>
          </div>
          <div class="loaded-file-control" id="audio-control" hidden>
            <select id="audio-switcher" aria-label="Selected audio"></select>
            <button id="clear-audio" class="clear-loaded-file" type="button" aria-label="Clear audio">
              <span class="material-symbols-rounded" aria-hidden="true">close</span>
            </button>
          </div>
          <div class="loaded-file-control" id="background-control" hidden>
            <select id="background-switcher" aria-label="Selected background"></select>
            <button id="clear-background" class="clear-loaded-file" type="button" aria-label="Clear background">
              <span class="material-symbols-rounded" aria-hidden="true">close</span>
            </button>
          </div>
          <div class="loaded-file-control" id="camera-control" hidden>
            <select id="camera-switcher" aria-label="Selected camera"></select>
            <button id="clear-camera" class="clear-loaded-file" type="button" aria-label="Clear camera">
              <span class="material-symbols-rounded" aria-hidden="true">close</span>
            </button>
          </div>
        </div>

        <span class="status" id="status"></span>

        <input id="model-file" type="file" accept=".pmx,.pmd,application/octet-stream" />
        <input id="model-folder" type="file" webkitdirectory directory multiple />
        <input id="motion-file" type="file" accept=".vmd,application/octet-stream" />
        <input id="pose-file" type="file" accept=".vpd,text/plain" />
        <input id="audio-file" type="file" accept=".wav,.mp3,.ogg,audio/wav,audio/mpeg,audio/ogg" />
        <input id="background-file" type="file" accept=".pmx,.pmd,application/octet-stream" />
        <input id="camera-file" type="file" accept=".vmd,application/octet-stream" />
        <audio id="bgm-audio" hidden></audio>
      </header>

      <section class="stage" aria-label="MMD model viewport">
        <canvas id="viewer-canvas"></canvas>
        <div class="empty-state" id="empty-state">
          Drop a PMX/PMD file or model folder, or click Menu -> Load Model
        </div>
        <div class="drop-target" id="drop-target">
          <strong>Drop model folders, PMX / PMD, VMD, VPD, or audio files</strong>
          <span>Model textures are resolved when a folder is selected.</span>
        </div>
        <div class="physics-error" id="physics-error" role="status" hidden></div>
        <div class="loading-indicator" id="loading-indicator" role="status" aria-live="polite" hidden>
          <span class="loading-spinner" aria-hidden="true"></span>
          <span id="loading-message">Loading</span>
        </div>
      </section>

      <footer class="transport" aria-label="Playback controls" hidden>
        <button id="play-toggle" type="button" aria-label="Play">
          <span class="material-symbols-rounded" aria-hidden="true">play_arrow</span>
        </button>
        <label>
          <span id="frame-value">0</span>
          <input id="timeline" type="range" min="0" max="10" value="0" step="0.001" />
        </label>
      </footer>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
